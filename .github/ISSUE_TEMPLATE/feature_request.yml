name: ✨ Feature Request
description: Suggest a new feature or improvement for Pixeldarium
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Pixeldarium? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
      placeholder: "It would be great if organisms could..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the simulation does this affect?
      options:
        - Rendering / Visuals
        - Simulation / Gameplay
        - UI / Controls
        - Persistence / Save/Load
        - Performance
        - Epoch / Progression
        - Planet / Terrain
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this be valuable? What problem does it solve?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, reference games, screenshots, or links
