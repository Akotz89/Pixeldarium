name: 🐛 Bug Report
description: Report a bug or crash in PixelSim
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below to help us reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: "When I zoom to ground level and click an organism, the page freezes..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open index.html in Chrome
        2. Wait for organisms to spawn
        3. Zoom into ground level
        4. Click on an organism
    validations:
      required: true

  - type: dropdown
    id: era
    attributes:
      label: Simulation Era
      description: What era was the simulation in when the bug occurred?
      options:
        - Organisms
        - Settlements
        - Colonies
        - Space
        - Galactic
        - N/A / Not sure

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: What browser are you using?
      placeholder: "Chrome 126, Edge 126, Firefox 128..."
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open DevTools (F12) → Console tab and paste any red error messages
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, save files, seed values, or anything else helpful

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I tested with the latest version from main branch
        - label: I checked existing issues for duplicates
